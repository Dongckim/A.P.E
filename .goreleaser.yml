version: 2

project_name: ape

before:
  hooks:
    - go mod tidy
    - sh -c "cd frontend && npm ci && npm run build"

builds:
  - main: ./main.go
    binary: ape
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: '{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}'

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

brews:
  - repository:
      owner: Dongckim
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: ape-gui
    homepage: https://github.com/Dongckim/A.P.E
    description: "AWS Platform Explorer — browse EC2 files and S3 buckets from your browser"
    license: MIT
    install: |
      bin.install "ape"
    test: |
      assert_match "A.P.E", shell_output("#{bin}/ape --version 2>&1", 1)

release:
  github:
    owner: Dongckim
    name: A.P.E
